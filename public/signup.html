<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - EcoStride</title>
  
  <!-- Google Fonts - Plus Jakarta Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Main Stylesheet -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page">
  <!-- Ambient Background Blobs -->
  <div class="ambient-blob blob-1"></div>
  <div class="ambient-blob blob-2"></div>
  <div class="ambient-blob blob-3"></div>

  <main class="auth-container">
    <div class="auth-card glass-panel">
      <div class="auth-header text-center">
        <a href="index.html" class="brand-logo-link">
          <div class="brand-icon mx-auto">
            <i class="fa-solid fa-seedling"></i>
          </div>
        </a>
        <h2>Join EcoStride</h2>
        <p>Create an account to start your journey</p>
      </div>

      <form class="auth-form">
        <div class="form-group">
          <label for="name">Full Name</label>
          <div class="input-with-icon">
            <i class="fa-solid fa-user input-icon"></i>
            <input type="text" id="name" name="name" required placeholder="John Doe">
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-with-icon">
            <i class="fa-solid fa-envelope input-icon"></i>
            <input type="email" id="email" name="email" required placeholder="you@example.com">
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-with-icon">
            <i class="fa-solid fa-lock input-icon"></i>
            <input type="password" id="password" name="password" required placeholder="••••••••">
          </div>
        </div>

        <div class="auth-actions">
          <button type="submit" class="btn btn-primary btn-large full-width">
            Sign Up <i class="fa-solid fa-arrow-right"></i>
          </button>
        </div>
      </form>

      <div class="auth-footer text-center">
        <p>Already have an account? <a href="login.html" class="auth-link">Login</a></p>
      </div>
    </div>
  </main>
  <script src="js/auth.js"></script>
</body>
</html>
