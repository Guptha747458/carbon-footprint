# render.yaml — Render deployment configuration
# Docs: https://render.com/docs/render-yaml-spec
#
# ─── DEPLOYMENT ARCHITECTURE ─────────────────────────────────────────────────
#
#  Frontend → Vercel  (React/Vite static site — see vercel.json)
#  Backend  → Render  (Express/Node.js API — this file)
#
# ─── PLAN OPTIONS ────────────────────────────────────────────────────────────
#
#  free     → $0/month. Spins down after 15 min inactivity (~30s cold start).
#             Anti-sleep ping via GitHub Actions keeps it alive 24/7 for free.
#             See: .github/workflows/keep-alive.yml
#
#  starter  → $7/month. Always-on. No cold starts. Recommended for production.
#             Change plan: free → starter below, then redeploy.
#
# ─────────────────────────────────────────────────────────────────────────────

services:
  - type: web
    name: ecostride-api
    runtime: node
    rootDir: server                 # Render's CWD = repo-root/server/
    plan: free                      # ← Change to 'starter' for always-on ($7/mo)
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health    # Used by Render + keep-alive.yml ping
    envVars:
      - key: NODE_ENV
        value: production

      - key: MONGODB_URI
        sync: false                 # Set this manually in Render dashboard (secret)

      - key: JWT_SECRET
        generateValue: true         # Render auto-generates a secure random value

      - key: ALLOWED_ORIGIN
        # Set to your Vercel frontend URL, e.g.:
        #   https://ecostride.vercel.app
        # Comma-separated for multiple origins:
        #   https://ecostride.vercel.app,https://ecostride-git-main-youruser.vercel.app
        sync: false                 # Set manually in Render dashboard
